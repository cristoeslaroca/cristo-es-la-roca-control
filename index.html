<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristo es la Roca - Sistema de Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        h2 {
            color: #666;
            font-weight: 300;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .btn {
            padding: 20px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-lider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-admin {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⛪</div>
        <h1>Templo Evangélico Pentecostés</h1>
        <h2>"Cristo es la Roca"</h2>
        
        <div class="buttons">
            <a href="formulario_lideres.html" class="btn btn-lider">
                <span class="icon">📝</span> Soy Líder - Registrar Actividades
            </a>
            <a href="panel_admin.html" class="btn btn-admin">
                <span class="icon">📊</span> Soy Administrador - Ver Estadísticas
            </a>
        </div>
        
        <div class="info">
            <strong>¿Necesitas ayuda?</strong><br>
            Contacta al pastor o administrador del sistema
        </div>
    </div>
</body>
</html>
